services:
  - type: web
    name: ragsearch-backend
    runtime: python
    rootDir: rag-hybrid-search
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
    disk:
      name: rag-data
      mountPath: /data
      sizeGB: 1

  - type: web
    name: ragsearch-frontend
    runtime: static
    rootDir: rag-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html